name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write  # required for OIDC / Trusted Publishers

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm install
      - run: npm run build

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Publish (Trusted Publishers / OIDC)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deprecate previous patch version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PATCH="${VERSION##*.}"
          if [ "$PATCH" -gt 0 ]; then
            PREV="${VERSION%.*}.$((PATCH - 1))"
            npm deprecate "@a2native/js@${PREV}" "Deprecated: upgrade to ${VERSION}" || true
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
